services:
  postgres:
    image: postgres:16-alpine
    container_name: pfa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stock
      POSTGRES_PASSWORD: stock
      POSTGRES_DB: stock_db
    volumes:
      - donnees_pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - pfa
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock -d stock_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: pfa-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://stock:stock@postgres:5432/stock_db
      SECRET_JWT: change-me-local-only
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pfa
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: pfa-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - pfa

volumes:
  donnees_pg:

networks:
  pfa:
    driver: bridge
