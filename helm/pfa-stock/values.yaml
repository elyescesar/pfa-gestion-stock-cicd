namespace: pfa-stock

imageApi:
  repository: pfa-stock-api
  tag: latest
  pullPolicy: IfNotPresent

imageWeb:
  repository: pfa-stock-web
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

postgres:
  user: stock
  password: stock
  database: stock_db
  storage: 1Gi

api:
  port: 8000
  replicas: 1

web:
  port: 80
  replicas: 1

ingress:
  className: nginx
  hosts:
    web: localhost
    api: localhost
  tls:
    enabled: false
  clusterIssuer: letsencrypt-prod

secretJwt: change-me-local-only
corsOrigins: http://localhost,http://localhost:3000

monitoring:
  enabled: true
  releaseLabel: kube-prometheus-stack
