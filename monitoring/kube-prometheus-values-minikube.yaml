# Overrides for minikube (RAM limits) — merge with kube-prometheus-values.yaml
grafana:
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.test
    annotations: {}
    tls: []

prometheus:
  prometheusSpec:
    retention: 6h
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 384Mi
        cpu: 300m

alertmanager:
  enabled: false

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeEtcd:
  enabled: false
