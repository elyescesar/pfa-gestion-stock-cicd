# Coexistence with Coolify Traefik (host already uses 80/443).
# Coolify proxy forwards HTTPS → http://127.0.0.1:30080 (see docs/vps-setup.md).
controller:
  hostPort:
    enabled: false
  service:
    type: NodePort
    nodePorts:
      http: 30080
      https: 30443
  ingressClassResource:
    name: nginx
    enabled: true
    default: true
  admissionWebhooks:
    enabled: false
