name: CI PFA Stock

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stock
          POSTGRES_PASSWORD: stock
          POSTGRES_DB: stock_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stock -d stock_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: ruff check app tests
      - run: pytest -q
        env:
          DATABASE_URL: postgresql://stock:stock@localhost:5432/stock_db

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint
      - run: npm test -- --run

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t pfa-stock-api:latest backend
      - run: docker build -t pfa-stock-web:latest --build-arg VITE_API_URL=http://localhost:8000 frontend

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init -backend=false
      - run: terraform fmt -check
      - run: terraform validate

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint helm/pfa-stock
      - run: helm template pfa-stock helm/pfa-stock -f helm/pfa-stock/values-minikube.yaml > /dev/null
      - run: helm template pfa-stock helm/pfa-stock -f helm/pfa-stock/values-prod.yaml > /dev/null

  kubernetes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install minikube
        run: |
          curl -Lo minikube https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
          sudo install minikube /usr/local/bin/minikube
          minikube start --driver=docker --cpus=2 --memory=4096 --profile=ci \
            --dns-proxy=false \
            --extra-config=kubelet.resolv-conf=/etc/resolv.conf

      - uses: azure/setup-helm@v4

      - name: Install ingress-nginx (Helm)
        run: |
          source scripts/lib-minikube.sh
          fix_minikube_dns ci
          install_ingress_nginx ci "$PWD"

      - name: Build app images in minikube docker
        run: |
          source scripts/lib-minikube.sh
          build_app_images_minikube ci "$PWD"

      - name: Deploy pfa-stock on minikube
        run: |
          helm upgrade --install pfa-stock ./helm/pfa-stock \
            --namespace pfa-stock \
            --create-namespace \
            -f helm/pfa-stock/values-minikube.yaml \
            --wait --timeout 10m

      - name: Smoke test API (in-cluster)
        run: |
          kubectl rollout status deployment/api -n pfa-stock --timeout=5m
          kubectl run smoke-api-ci --rm -i --restart=Never -n pfa-stock \
            --image=curlimages/curl:8.10.1 \
            --command -- curl -sf "http://api:8000/health"
          echo "In-cluster /health OK"
