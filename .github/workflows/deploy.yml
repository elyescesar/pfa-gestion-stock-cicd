name: Deploy PFA Stock

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/pfa-stock-api
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/pfa-stock-web
  VITE_API_URL: https://api.pfa.elyes.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ env.IMAGE_API }}:${{ github.sha }}
            ${{ env.IMAGE_API }}:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          build-args: VITE_API_URL=${{ env.VITE_API_URL }}
          tags: |
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
            ${{ env.IMAGE_WEB }}:latest

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Ensure GHCR pull secret
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          if [ -z "$GHCR_PAT" ]; then
            echo "GHCR_PAT secret not set — skip pull secret (images must be public or secret pre-created on cluster)"
            exit 0
          fi
          kubectl create namespace pfa-stock --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="$GHCR_PAT" \
            --namespace=pfa-stock \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy application (Helm)
        env:
          SECRET_JWT: ${{ secrets.SECRET_JWT }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          helm upgrade --install pfa-stock ./helm/pfa-stock \
            --namespace pfa-stock \
            --create-namespace \
            -f helm/pfa-stock/values-prod.yaml \
            --set imageApi.repository=${{ env.IMAGE_API }} \
            --set imageApi.tag=${{ github.sha }} \
            --set imageWeb.repository=${{ env.IMAGE_WEB }} \
            --set imageWeb.tag=${{ github.sha }} \
            --set-string secretJwt="${SECRET_JWT}" \
            --set-string postgres.password="${POSTGRES_PASSWORD}" \
            --wait --timeout 10m

      - name: Smoke test API
        run: |
          sleep 15
          curl -sf "https://api.pfa.elyes.dev/health"
